_format_version: "3.0"
_transform: true

services:
  - name: discovery-orchestrator
    url: http://discovery-orchestrator:5010
    routes:
      - name: discovery-route
        paths:
          - /api/v1/discovery
          - /api/v1/inventory # Redirect old path to orchestrator
        strip_path: false

  - name: checkout-orchestrator
    url: http://checkout-orchestrator:5011
    routes:
      - name: checkout-route
        paths:
          - /api/v1/checkout
        strip_path: false

  - name: order-service
    url: http://order-ms:5002
    routes:
      - name: order-route
        paths:
          - /api/v1/orders
        strip_path: false
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          claims_to_verify:
            - exp

  - name: payment-service
    url: http://payment-ms:5003
    routes:
      - name: payment-route
        paths:
          - /api/v1/payments
        strip_path: false

  - name: alert-service
    url: http://alert-ms:5004
    routes:
      - name: alert-route
        paths:
          - /api/v1/notifications
          - /api/v1/alert
        strip_path: false

  - name: logistics-service
    url: http://logistics-ms:5005
    routes:
      - name: logistics-route
        paths:
          - /api/v1/logistics
        strip_path: false

  - name: user-service
    url: http://user-ms:5006
    routes:
      - name: user-route
        paths:
          - /api/v1/users
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      policy: local

consumers:
  - username: user-ms-issuer
    jwt_secrets:
      - key: "chomp-issuer"
        secret: "chomp_jwt_secret_123"
        algorithm: "HS256"
